<!DOCTYPE html>
<html lang="pt-BR">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Cerberus</title>
  <link rel="icon" type="image/svg+xml" href="/favicon.svg">
  <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32x32.png">
  <link rel="icon" type="image/png" sizes="16x16" href="/favicon-16x16.png">
  <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png">
  <link rel="shortcut icon" href="favicon.ico" type="image/x-icon">
  
</head>

<body>
  <div class="painel-app">
    <aside class="cerberus-barra-lateral">
      <header class="cerberus-painel-lateral cerberus-marca">
        <img src="/cerberus-dashboard.png" alt="Cerberus Logo" class="cerberus-hexagono-marca"
          style="width: 65px; height: 65px; flex-shrink: 0;">
        <h1 class="cerberus-titulo-marca">Cerberus</h1>
      </header>

      <section class="cerberus-painel-lateral cerberus-nav-painel">
        <div class="cerberus-nav-lista">
          <a href="/conectar" class="cerberus-nav-item d-none" id="nav-conectar" data-route>
            <span class="icone-nav" style="margin-bottom: 0.25rem;">
              <svg viewBox="0 0 24 24" width="24" height="24" stroke="currentColor" stroke-width="2" fill="none"
                stroke-linecap="round" stroke-linejoin="round">
                <ellipse cx="12" cy="5" rx="9" ry="3"></ellipse>
                <path d="M21 12c0 1.66-4 3-9 3s-9-1.34-9-3"></path>
                <path d="M3 5v14c0 1.66 4 3 9 3s9-1.34 9-3V5"></path>
              </svg>
            </span>
            <span class="cerberus-nav-rotulo">Conectar Banco</span>
            <span class="cerberus-nav-descricao">Estabelecer conexão</span>
          </a>
          <a href="/dashboard" class="cerberus-nav-item nav-protegida" data-route>
            <span id="icone-nav-dashboard"></span>
            <span class="cerberus-nav-rotulo">Dashboard</span>
            <span class="cerberus-nav-descricao">Visão geral operacional</span>
          </a>
          <a href="/backups" class="cerberus-nav-item nav-protegida" data-route>
            <span id="icone-nav-backups"></span>
            <span class="cerberus-nav-rotulo">Backups</span>
            <span class="cerberus-nav-descricao">Jobs e integridade</span>
          </a>
          <a href="/servidores" class="cerberus-nav-item nav-protegida" data-route>
            <span id="icone-nav-servidores"></span>
            <span class="cerberus-nav-rotulo">Servidores</span>
            <span class="cerberus-nav-descricao">Saúde da infraestrutura</span>
          </a>
        </div>
      </section>

      <section class="cerberus-painel-lateral cerberus-conta-painel nav-protegida">
        <p class="cerberus-rotulo-secao">Conta Operacional</p>
        <div class="cerberus-conta-linha mb-3">
          <div class="cerberus-avatar">GA</div>
          <div>
            <div class="cerberus-conta-nome">Gabriel A.</div>
            <div class="cerberus-conta-cargo">Administrador</div>
          </div>
        </div>
        <a href="/configuracoes" class="cerberus-conta-botao text-decoration-none" data-route>
          <span id="icone-nav-config"></span>
          <span>Configurações</span>
        </a>
      </section>
    </aside>

    <main class="painel-conteudo-principal">
      <div class="area-conteudo">
        <header class="d-flex justify-content-between align-items-center mb-5">
          <div class="d-flex align-items-center gap-3">
            <button id="btn-alternar-barra" class="btn-alternar-menu">
              <span id="icone-menu-toggle"></span>
            </button>
            <h2 id="titulo-pagina" class="h3 m-0 fonte-titulo">Painel</h2>
          </div>
          <div class="badge bg-white text-dark border p-2 px-3 rounded-pill fw-normal shadow-sm">
            <span class="text-success me-1">●</span> Sistema Online
          </div>
        </header>

        <div id="app-content"></div>
      </div>

      <footer class="rodape">
        <div class="container-fluid">
          &copy; 2026 Cerberus Enterprise. Todos os direitos reservados.
        </div>
      </footer>
    </main>
  </div>

  <script type="module" src="/src/main.js"></script>
</body>

</html>
